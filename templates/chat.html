<!DOCTYPE html>
<html>
<head>
    <title>ItsChat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="ItsChat - A simple, real-time global and private messaging app.">
    <meta name="keywords" content="ItsChat, Chat App, Messaging, Real-time">
    <meta name="google-site-verification" content="qQt9M9rKVhv3y69fc4fMKocVlxAk3wb8Br7-T1riv8k" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: Arial, sans-serif; display: flex; margin: 0; height: 100vh; background-color: #ece5dd; }
        #sidebar { width: 30%; background: #075e54; color: white; display: flex; flex-direction: column; }
        #chat-area { width: 70%; display: flex; flex-direction: column; }
        .header { background: #128c7e; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #users-list { overflow-y: auto; flex-grow: 1; }
        .user-card { padding: 15px; border-bottom: 1px solid #128c7e; cursor: pointer; background: #075e54; }
        .user-card:hover { background: #128c7e; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: scroll; background: #e5ddd5; }
        .msg-box { display: flex; padding: 10px; background: white; border-top: 1px solid #ccc; }
        input[type="text"] { flex-grow: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; margin-right: 10px; }
        button { padding: 10px 20px; background: #128c7e; color: white; border: none; border-radius: 20px; cursor: pointer; }
        
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 30%; border-bottom: 2px solid #128c7e; }
            #chat-area { width: 100%; height: 70%; }
            .user-card { display: inline-block; padding: 10px; border: 1px solid white; margin: 5px; border-radius: 10px; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">Hello, {{ username }}</div>
        <div id="users-list">
            <div class="user-card" onclick="startChat('World')">🌍 World Chat</div>
            {% for u in users %}
                <div class="user-card" onclick="startChat('{{ u.username }}')">👤 {{ u.username }}</div>
            {% endfor %}
        </div>
    </div>

    <div id="chat-area">
        <div class="header" id="chat-title">🌍 World Chat</div>
        <div id="messages"></div>
        <div class="msg-box">
            <input type="text" id="msg-input" placeholder="Type a message...">
            <button onclick="sendMsg()">Send</button>
        </div>
    </div>

    <script>
        var socket = io();
        var currentUser = "{{ username }}";
        var currentChat = "World";
        var currentRoom = "World";

        function getRoomId(user1, user2) {
            return [user1, user2].sort().join('_');
        }

        function loadMessages(targetUser) {
            var messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = ''; 
            
            fetch('/get_messages/' + targetUser)
                .then(response => response.json())
                .then(data => {
                    data.messages.forEach(msg => {
                        messagesDiv.innerHTML += '<p style="background:white; padding:8px; border-radius:8px; max-width:80%; margin:5px 0;"><b>' + msg.sender + ':</b> ' + msg.content + '</p>';
                    });
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                });
        }

        function startChat(targetUser) {
            currentChat = targetUser;
            document.getElementById('chat-title').innerText = targetUser === 'World' ? '🌍 World Chat' : '👤 ' + targetUser;
            
            if (targetUser !== 'World') {
                currentRoom = getRoomId(currentUser, targetUser);
                socket.emit('join', {room: currentRoom});
            } else {
                currentRoom = "World";
            }
            
            loadMessages(targetUser); 
        }

        socket.on('message', function(msg) {
            var messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML += '<p style="background:white; padding:8px; border-radius:8px; max-width:80%; margin:5px 0;">' + msg + '</p>';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });

        function sendMsg() {
            var input = document.getElementById('msg-input');
            var msgText = input.value.trim();
            if(msgText !== "") {
                if (currentChat === 'World') {
                    socket.send(msgText);
                } else {
                    socket.emit('private_message', { room: currentRoom, msg: msgText, receiver: currentChat });
                }
                input.value = '';
            }
        }
        
        window.onload = function() {
            startChat('World');
        };
    </script>
</body>
</html>
