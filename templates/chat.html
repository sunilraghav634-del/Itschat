<!DOCTYPE html>
<html>
<head>
    <title>ItsChat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: Arial, sans-serif; display: flex; margin: 0; height: 100vh; }
        #sidebar { width: 25%; background: #2c3e50; color: white; padding: 20px; overflow-y: auto; }
        #chat-area { width: 75%; display: flex; flex-direction: column; padding: 20px; }
        #messages { flex-grow: 1; border: 1px solid #ccc; padding: 10px; overflow-y: scroll; margin-bottom: 10px; background: #ecf0f1; }
        .user-card { padding: 10px; border-bottom: 1px solid #34495e; cursor: pointer; }
        .user-card:hover { background: #34495e; }
        input[type="text"] { width: 80%; padding: 10px; }
        button { padding: 10px; width: 15%; cursor: pointer; background: #2980b9; color: white; border: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>Welcome, {{ username }}</h3>
        <hr>
        <h4>Other Users</h4>
        {% for u in users %}
            <div class="user-card">{{ u.username }}</div>
        {% endfor %}
    </div>

    <div id="chat-area">
        <h3>World Chat</h3>
        <div id="messages"></div>
        <div>
            <input type="text" id="msg-input" placeholder="Type a message...">
            <button onclick="sendMsg()">Send</button>
        </div>
    </div>

    <script>
        var socket = io();

        socket.on('message', function(msg) {
            var messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML += '<p>' + msg + '</p>';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });

        function sendMsg() {
            var input = document.getElementById('msg-input');
            if(input.value.trim() !== "") {
                socket.send(input.value);
                input.value = '';
            }
        }
    </script>
</body>
  </html>
